title: "[Question] "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Ask usage and workflow questions here. For defects, please use Issue templates.
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include commands, menu paths, and current behavior.
  - type: input
    id: version
    attributes:
      label: QUILL version (if relevant)
