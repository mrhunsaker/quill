name: Feature request
description: Suggest an improvement or new capability for QUILL.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Share the idea — only the first field is required. The rest just help us understand it.
  - type: textarea
    id: idea
    attributes:
      label: What would you like QUILL to do?
      description: Describe the problem you're trying to solve and the change you'd like to see.
      placeholder: |
        Today I have to ....
        It would help if QUILL could ....
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Which area?
      description: Optional.
      options:
        - Not sure
        - Editor and writing workflow
        - Navigation and structure tools
        - Search and replace
        - Formatting and markup (Markdown/HTML)
        - Snippets and word prediction
        - Compare and review
        - GLOW audit/fix
        - AI connection / assistant
        - Dictation / Watch Folder
        - Read Aloud
        - Document intake and conversion
        - Accessibility and low-vision support
        - Profiles, keymap, customization
        - Installer, update, distribution
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds
      description: Anything you're doing today to get by, or other approaches you considered.
    validations:
      required: false
  - type: textarea
    id: accessibility
    attributes:
      label: Accessibility considerations
      description: Optional — note any keyboard, screen reader, focus, or discoverability impact.
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I checked existing issues for a similar request.
          required: true
