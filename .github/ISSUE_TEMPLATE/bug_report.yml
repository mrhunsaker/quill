name: Bug report
description: Something in QUILL is broken or behaving incorrectly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Only a couple of fields are required — fill in what you can and submit.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem, and what you expected instead.
      placeholder: |
        When I ..., QUILL did ....
        I expected it to ... instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Press ...
        3. Observe ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Which area?
      description: Optional — helps us route it faster.
      options:
        - Not sure
        - Editor (typing, selection, undo/redo)
        - Search and replace
        - Navigation and outline
        - Formatting and markup (Markdown/HTML)
        - Snippets and word prediction
        - Compare and review
        - GLOW audit/fix
        - AI connection / assistant
        - Read Aloud
        - Dictation / Watch Folder
        - Document intake and conversion
        - Accessibility and announcements
        - Profiles / keymap / settings
        - Startup, updates, installer
        - Performance or stability
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: QUILL version and OS
      description: Find the version under Help -> About.
      placeholder: "Example: 0.1.2 on Windows 11"
    validations:
      required: false
  - type: dropdown
    id: screen_reader
    attributes:
      label: Screen reader (if you use one)
      options:
        - Not using a screen reader
        - NVDA
        - JAWS
        - Narrator
        - Other
    validations:
      required: false
  - type: textarea
    id: more
    attributes:
      label: Anything else?
      description: Logs (with sensitive data removed), workarounds, screenshots, or other context.
    validations:
      required: false
  - type: checkboxes
    id: confirmations
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and removed any sensitive data from what I pasted.
          required: true
