name: Performance / reliability issue
description: Report slow paths, hangs, crashes, memory pressure, or startup problems.
title: "[Perf]: "
labels: ["bug", "performance"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Reliability area
      options:
        - Slow startup
        - Slow open/save
        - Editor lag while typing/navigation
        - Freeze/hang
        - Crash on action
        - High memory usage
        - High CPU usage
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: trigger
    attributes:
      label: Trigger pattern
      description: What input size or sequence reliably triggers this?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior or performance target
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: size
    attributes:
      label: File size / workload
      placeholder: "Example: 1 MB markdown file, 200-page PDF"
  - type: input
    id: version
    attributes:
      label: QUILL version
      placeholder: "0.1.2"
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: System details
      placeholder: "CPU / RAM / Windows version"
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Crash dump / diagnostics (optional)
