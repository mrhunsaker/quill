name: Snippets / word prediction issue
description: Report problems with snippet insertion, trigger expansion, placeholders, or Ctrl+Space prediction.
title: "[Snippets]: "
labels: ["bug", "snippets"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Ctrl+Space word prediction
        - Ctrl+Alt+Space insert snippet
        - Ctrl+Alt+Shift+Space manage snippets
        - Trigger expansion while typing
        - Placeholder handling
        - Starter snippet packs
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: snippet_trigger
    attributes:
      label: Snippet trigger/name (if applicable)
  - type: input
    id: version
    attributes:
      label: QUILL version
      placeholder: "0.1.2"
    validations:
      required: true
