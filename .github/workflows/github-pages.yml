name: github-pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/github-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Stage docs site
        shell: bash
        run: |
          rm -rf site-root
          mkdir -p site-root/docs
          cp -R docs/site/. site-root/
          cp docs/userguide.* site-root/docs/ 2>/dev/null || true
          cp docs/announcement-beta.* site-root/docs/ 2>/dev/null || true
          cp docs/QUILL-PRD.* site-root/docs/ 2>/dev/null || true
          cp -R docs/engineering site-root/docs/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site-root
      - id: deployment
        uses: actions/deploy-pages@v4
